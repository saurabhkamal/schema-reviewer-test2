services:
  postgres-analytics:
    image: postgres:15-alpine
    container_name: analytics_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_demo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Using 5433 to avoid conflict with existing PostgreSQL on 5432
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
      - ./analytics_demo.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  analytics_postgres_data:
